name: TodoMVC Tests
url: https://demo.playwright.dev/todomvc/

config:
  timeout: 180000

tests:
  - name: Add a todo item
    tags: [smoke]
    steps:
      - Navigate to the home page
      - Add a new todo item "Buy groceries"
      - Verify that "Buy groceries" appears in the todo list

  - name: Complete a todo item
    steps:
      - Navigate to the home page
      - Type "Write project report" in the new todo input and press Enter
      - Mark "Write project report" as completed
      - Verify that "Write project report" has the completed class

  - name: Filter todos
    steps:
      - Navigate to the home page
      - Add three todo items "Task 1", "Task 2", and "Task 3"
      - Mark the first todo as completed
      - Click the Active filter to show only active todos
      - Verify that only 2 active todos are shown
