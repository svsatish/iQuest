<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none" role="img" aria-label="iQuest architecture: AI agent orchestrating browser and API testing">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EB521E"/>
      <stop offset="100%" stop-color="#FF7A3D"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Decorative orbs -->
  <circle cx="100" cy="80" r="120" fill="#EB521E" fill-opacity="0.06" filter="url(#glow)"/>
  <circle cx="700" cy="320" r="150" fill="#7C3AED" fill-opacity="0.05" filter="url(#glow)"/>

  <!-- Central AI Agent -->
  <g filter="url(#softShadow)">
    <!-- Agent core -->
    <circle cx="400" cy="200" r="70" fill="url(#agentGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Agent inner glow -->
    <circle cx="400" cy="200" r="50" fill="none" stroke="url(#agentGrad)" stroke-width="3" stroke-opacity="0.5"/>
    <!-- AI brain icon -->
    <g transform="translate(400, 200)">
      <path d="M-20 -10 Q-25 -15 -20 -20 Q-15 -25 -10 -20 Q-5 -15 0 -10 Q5 -15 10 -20 Q15 -25 20 -20 Q25 -15 20 -10 Q15 -5 0 -5 Q-15 -5 -20 -10Z" fill="rgba(255,255,255,0.2)"/>
      <path d="M-15 -5 Q-18 -10 -13 -15 Q-8 -20 -3 -15 Q2 -10 3 -5 Q2 0 -3 5 Q-8 10 -13 5 Q-18 0 -15 -5Z" fill="rgba(255,255,255,0.3)"/>
      <circle cx="0" cy="-2" r="8" fill="white" fill-opacity="0.9"/>
    </g>
    <!-- Sparkles around agent -->
    <g fill="url(#brandGrad)">
      <polygon points="400,105 403,112 411,112 405,117 407,125 400,120 393,125 395,117 389,112 397,112" transform="rotate(0 400 105)"/>
      <polygon points="485,155 487,159 492,159 489,162 490,166 485,163 480,166 481,162 478,159 483,159" transform="rotate(15 485 155)"/>
      <polygon points="315,155 317,159 322,159 319,162 320,166 315,163 310,166 311,162 308,159 313,159" transform="rotate(-15 315 155)"/>
      <polygon points="340,280 342,284 347,284 344,287 345,291 340,288 335,291 336,287 333,284 338,284" transform="rotate(30 340 280)"/>
      <polygon points="460,280 462,284 467,284 464,287 465,291 460,288 455,291 456,287 453,284 458,284" transform="rotate(-30 460 280)"/>
    </g>
  </g>

  <!-- Connection lines from agent -->
  <g stroke="url(#brandGrad)" stroke-width="3" stroke-dasharray="8,6" stroke-linecap="round" opacity="0.6">
    <path d="M330,200 Q280,200 220,180" fill="none"/>
    <path d="M470,200 Q520,200 580,180" fill="none"/>
    <path d="M330,200 Q280,200 220,220" fill="none"/>
    <path d="M470,200 Q520,200 580,220" fill="none"/>
  </g>

  <!-- Browser Window (left) -->
  <g transform="translate(80, 120)" filter="url(#softShadow)">
    <rect x="0" y="0" width="180" height="140" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="36" rx="12" fill="url(#browserGrad)"/>
    <circle cx="16" cy="18" r="6" fill="rgba(255,255,255,0.2)"/>
    <circle cx="36" cy="18" r="6" fill="rgba(255,255,255,0.2)"/>
    <circle cx="56" cy="18" r="6" fill="rgba(255,255,255,0.2)"/>
    <!-- Address bar -->
    <rect x="20" y="50" width="140" height="28" rx="6" fill="#f3f4f6"/>
    <text x="30" y="70" font-family="system-ui" font-size="11" fill="#9ca3af">https://example.com</text>
    <!-- Page content lines -->
    <rect x="20" y="95" width="140" height="12" rx="3" fill="#EB521E" fill-opacity="0.2"/>
    <rect x="20" y="112" width="100" height="12" rx="3" fill="#4F46E5" fill-opacity="0.15"/>
    <rect x="20" y="129" width="120" height="12" rx="3" fill="#4F46E5" fill-opacity="0.15"/>
    <!-- Playwright indicator -->
    <text x="170" y="25" font-family="system-ui" font-size="9" fill="#4F46E5" font-weight="600" text-anchor="end">Playwright</text>
  </g>

  <!-- Browser Window (right) - Mobile view -->
  <g transform="translate(560, 140)" filter="url(#softShadow)">
    <rect x="0" y="0" width="100" height="160" rx="20" fill="white" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="0" y="0" width="100" height="28" rx="20" fill="url(#browserGrad)"/>
    <circle cx="50" cy="14" r="4" fill="rgba(255,255,255,0.3)"/>
    <!-- Mobile content -->
    <rect x="15" y="45" width="70" height="10" rx="2" fill="#EB521E" fill-opacity="0.3"/>
    <rect x="15" y="60" width="70" height="8" rx="2" fill="#4F46E5" fill-opacity="0.15"/>
    <rect x="15" y="73" width="50" height="8" rx="2" fill="#4F46E5" fill-opacity="0.15"/>
    <rect x="15" y="86" width="70" height="8" rx="2" fill="#4F46E5" fill-opacity="0.15"/>
    <rect x="15" y="105" width="70" height="40" rx="6" fill="#f3f4f6"/>
    <rect x="25" y="115" width="50" height="8" rx="2" fill="#EB521E" fill-opacity="0.3"/>
    <rect x="25" y="128" width="30" height="8" rx="2" fill="#4F46E5" fill-opacity="0.15"/>
  </g>

  <!-- API Server (bottom left) -->
  <g transform="translate(100, 300)" filter="url(#softShadow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="10" fill="url(#apiGrad)"/>
    <text x="80" y="18" font-family="system-ui" font-size="11" fill="white" font-weight="600" text-anchor="middle">REST / GraphQL API</text>
    <!-- Request/Response -->
    <text x="15" y="45" font-family="monospace" font-size="9" fill="#059669">GET /api/users → 200 OK</text>
    <text x="15" y="58" font-family="monospace" font-size="9" fill="#4F46E5">POST /api/auth → 201 Created</text>
    <!-- Server icon -->
    <rect x="130" y="10" width="20" height="48" rx="3" fill="url(#apiGrad)" fill-opacity="0.3"/>
    <rect x="132" y="14" width="16" height="6" rx="1" fill="url(#apiGrad)"/>
    <rect x="132" y="24" width="16" height="6" rx="1" fill="url(#apiGrad)"/>
    <rect x="132" y="34" width="16" height="6" rx="1" fill="url(#apiGrad)"/>
    <rect x="132" y="44" width="16" height="6" rx="1" fill="url(#apiGrad)"/>
  </g>

  <!-- API Server (bottom right) -->
  <g transform="translate(540, 300)" filter="url(#softShadow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="10" fill="url(#apiGrad)"/>
    <text x="80" y="18" font-family="system-ui" font-size="11" fill="white" font-weight="600" text-anchor="middle">WebSocket / MCP</text>
    <!-- Real-time indicators -->
    <circle cx="30" cy="48" r="6" fill="#10B981" fill-opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="48" r="6" fill="#10B981" fill-opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="130" cy="48" r="6" fill="#10B981" fill-opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="15" y="62" font-family="system-ui" font-size="9" fill="#6b7280">Real-time agent ↔ browser sync</text>
  </g>

  <!-- Feature labels -->
  <g font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">
    <text x="170" y="280" font-weight="500" fill="#4F46E5">Browser Automation</text>
    <text x="610" y="320" font-weight="500" fill="#4F46E5">Mobile Testing</text>
    <text x="180" y="385" font-weight="500" fill="#059669">API Testing</text>
    <text x="620" y="385" font-weight="500" fill="#059669">MCP Protocol</text>
  </g>

  <!-- Natural language indicator -->
  <g transform="translate(400, 380)" text-anchor="middle">
    <rect x="-180" y="-14" width="360" height="28" rx="14" fill="url(#brandGrad)" fill-opacity="0.15" stroke="url(#brandGrad)" stroke-width="1.5"/>
    <text x="0" y="4" font-family="system-ui" font-size="12" fill="#EB521E" font-weight="500">
      <tspan fill="#374151">Write: </tspan>
      <tspan font-style="italic">"Click the login button"</tspan>
      <tspan fill="#374151"> → Agent handles the rest</tspan>
    </text>
  </g>
</svg>