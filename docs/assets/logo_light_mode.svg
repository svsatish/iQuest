<svg xmlns="http://www.w3.org/2000/svg" width="400" height="72" viewBox="0 0 200 36">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      .wordmark { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 600; fill: #0F172A; letter-spacing: -0.3px; }
      .tagline { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 400; fill: #64748B; letter-spacing: 1.2px; text-transform: uppercase; }
      .accent { fill: #0EA5E9; }
    </style>
  </defs>
  <!-- Icon mark: iQ monogram in a rounded square -->
  <g transform="translate(3, 3)">
    <svg width="30" height="30" viewBox="0 0 32 32">
      <!-- Background rounded square -->
      <rect x="0" y="0" width="32" height="32" rx="6" fill="#0EA5E9"/>
      <!-- iQ monogram -->
      <text x="16" y="21" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="-0.5px">iQ</text>
    </svg>
  </g>
  <!-- Wordmark: iQuest -->
  <text x="42" y="24" class="wordmark">iQuest</text>
  <!-- Tagline -->
  <text x="42" y="34" class="tagline">Discover. Validate. Assure.</text>
</svg>